<!DOCTYPE html>
<html>
<head>
    <title>Block One Attendance Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 30px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        img {
            width: 120px;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            background-color: #003366;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0055aa;
        }

        #result {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Logo -->
    <img src="https://drive.google.com/uc?export=view&id=1fpYzjz3noH_-xqMv8MAb2ebL-JooYw5w" alt="Institution Logo">

    <h3>Block One Attendance</h3>

    <input type="text" id="usnInput" placeholder="Enter Your USN">
    <br>
    <button onclick="searchAttendance()">Search</button>

    <div id="result"></div>

</div>

<script>
async function searchAttendance() {

    const usn = document.getElementById("usnInput").value.trim().toUpperCase();
    const response = await fetch("attendance.json");
    const data = await response.json();

    const student = data.find(s => s.USN.toUpperCase() === usn);

    if(student){
        document.getElementById("result").innerHTML = `
            <p><strong>Name:</strong> ${student.Name}</p>
            <p><strong>Semester:</strong> ${student.Sem}</p>
            <p><strong>Total Classes:</strong> ${student.Total}</p>
            <p><strong>Present:</strong> ${student.Present}</p>
            <p><strong>Attendance %:</strong> ${student.Percentage}</p>
        `;
    } else {
        document.getElementById("result").innerHTML =
            "<p style='color:red;'>USN Not Found</p>";
    }
}
</script>

</body>
</html>

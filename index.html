<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Block One Attendance Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f4f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 500px;
            margin: 70px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            width: 120px;
            margin-bottom: 15px;
        }

        h2 {
            color: #003366;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0055aa;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
        }

        .error {
            color: red;
            text-align: center;
        }

        .row {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Recommended: Upload logo.png to GitHub -->
    <img src="logo.png" alt="Institution Logo">

    <h2>Block One Attendance</h2>

    <input type="text" id="usnInput" placeholder="Enter Your USN">
    <br>
    <button onclick="searchAttendance()">Search</button>

    <div id="result"></div>

</div>

<script>
async function searchAttendance() {

    const usn = document.getElementById("usnInput").value.trim().toUpperCase();
    const resultDiv = document.getElementById("result");

    if (!usn) {
        resultDiv.innerHTML = "<p class='error'>Please enter USN</p>";
        return;
    }

    try {
        const response = await fetch("attendance.json");
        const data = await response.json();

        // Automatically detect USN column
        const student = data.find(row =>
            Object.values(row).some(value =>
                value && value.toString().toUpperCase() === usn
            )
        );

        if (!student) {
            resultDiv.innerHTML = "<p class='error'>USN Not Found</p>";
            return;
        }

        let output = "";

        // Dynamically display all fields for that student
        for (let key in student) {
            output += `
                <div class="row">
                    <strong>${key}:</strong> ${student[key]}
                </div>
            `;
        }

        resultDiv.innerHTML = output;

    } catch (error) {
        resultDiv.innerHTML = "<p class='error'>Error loading attendance data</p>";
        console.error(error);
    }
}
</script>

</body>
</html>
